<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康 BMI 計算機</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full">
        <a href="../index.html" class="text-emerald-600 hover:underline text-sm font-medium">← 返回首頁</a>
        <h2 class="text-2xl font-bold text-slate-800 mt-4 mb-6 text-center">⚖️ 健康 BMI 計算機</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">身高 (公分)</label>
                <input type="number" id="height" placeholder="例如：175" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">體重 (公斤)</label>
                <input type="number" id="weight" placeholder="例如：65" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-emerald-500">
            </div>
            <button onclick="calcBMI()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-xl transition-colors mt-2">開始計算</button>
        </div>

        <div id="resultBox" class="mt-6 p-4 rounded-xl bg-slate-50 text-center hidden">
            <p class="text-slate-500 text-sm">您的 BMI 值為</p>
            <p id="bmiValue" class="text-3xl font-extrabold text-emerald-600 my-1">0.0</p>
            <p id="bmiStatus" class="font-bold text-slate-700"></p>
        </div>
    </div>

    <script>
        function calcBMI() {
            const h = parseFloat(document.getElementById('height').value) / 100;
            const w = parseFloat(document.getElementById('weight').value);
            if(!h || !w) { alert('請輸入完整的身高與體重！'); return; }
            
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('bmiValue').innerText = bmi;
            
            let status = "";
            if(bmi < 18.5) status = "體重過輕，多吃點營養的食物吧！";
            else if(bmi < 24) status = "太棒了！您的體重在正常範圍內。";
            else if(bmi < 27) status = "過重囉，記得多運動保持健康！";
            else status = "肥胖警告，為了健康要開始控制飲食囉！";
            
            document.getElementById('bmiStatus').innerText = status;
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
